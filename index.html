<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Corporate Loan Calculator – Premier Credit Ltd</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:      #E8720C;
    --orange-light:#F59340;
    --orange-dark: #B85A08;
    --navy:        #0D1B2A;
    --navy-mid:    #1A2E45;
    --navy-soft:   #243B55;
    --cream:       #FAF6EE;
    --cream-dark:  #F0E9D8;
    --text:        #1A1A2E;
    --text-muted:  #6B7280;
    --white:       #FFFFFF;
    --error:       #C0392B;
    --shadow:      0 6px 30px rgba(13,27,42,0.22);
    --radius:      16px;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0 12px;
    overflow-x: hidden;
  }

  .page-wrapper {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    margin: 24px 0;
  }

  /* ── Header (top banner) ── */
  .header {
    background: linear-gradient(160deg, var(--navy-soft) 0%, var(--navy-mid) 100%);
    padding: 28px 24px 24px;
    text-align: center;
    border-bottom: 3px solid var(--orange);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 60% at 50% 0%, rgba(232,114,12,0.13) 0%, transparent 70%);
    pointer-events: none;
  }
  .company-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--orange-light);
    margin-bottom: 10px;
    position: relative;
  }
  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 5.5vw, 24px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.25;
    position: relative;
  }
  .main-title span {
    color: var(--orange-light);
  }
  .title-rule {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    margin: 10px auto 0;
    position: relative;
  }

  /* ── Card (white area below header) ── */
  .card {
    background: var(--white);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ── Tabs ── */
  .tab-bar {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--cream-dark);
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  .tab-btn {
    padding: 14px 10px;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: none; border: none;
    cursor: pointer;
    position: relative;
    transition: color 0.25s, background 0.25s;
  }
  .tab-btn::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: var(--orange);
    transform: scaleX(0);
    transition: transform 0.3s ease;
    border-radius: 2px 2px 0 0;
  }
  .tab-btn.active {
    color: var(--orange);
    background: var(--white);
  }
  .tab-btn.active::after { transform: scaleX(1); }

  /* ── Panel ── */
  .tab-panel { display: none; padding: 24px 20px 32px; }
  .tab-panel.active { display: block; }

  /* ── Form fields ── */
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--navy-soft);
    margin-bottom: 7px;
  }
  .input-wrap {
    position: relative;
    display: flex; align-items: center;
  }
  .input-prefix {
    position: absolute; left: 12px;
    font-size: 12.5px; font-weight: 700;
    color: var(--orange-dark);
    pointer-events: none;
    user-select: none;
  }
  .field input {
    width: 100%;
    padding: 13px 12px 13px 46px;
    border: 1.5px solid #D1D5DB;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  .field input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(232,114,12,0.15);
    background: #fff;
  }
  .field input.no-prefix { padding-left: 12px; }

  /* ── Button ── */
  .calc-btn {
    width: 100%;
    padding: 14px;
    margin-top: 4px;
    background: linear-gradient(135deg, var(--orange-dark), var(--orange));
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(232,114,12,0.35);
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
  }
  .calc-btn:active {
    transform: scale(0.98);
    opacity: 0.9;
  }

  /* ── Error msg ── */
  .error-msg {
    margin-top: 12px;
    padding: 9px 13px;
    background: rgba(192,57,43,0.08);
    border: 1px solid rgba(192,57,43,0.25);
    border-radius: 8px;
    font-size: 12.5px;
    color: var(--error);
    display: none;
  }
  .error-msg.show { display: block; }

  /* ── Result box ── */
  .result-box {
    margin-top: 20px;
    background: linear-gradient(150deg, var(--navy) 0%, var(--navy-soft) 100%);
    border-radius: 12px;
    padding: 22px 18px;
    display: none;
    text-align: center;
    animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  .result-box.show { display: block; }

  .result-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232,114,12,0.8);
    margin-bottom: 6px;
  }
  .result-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 9vw, 40px);
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }
  .result-divider {
    width: 40px; height: 1px;
    background: rgba(232,114,12,0.4);
    margin: 14px auto 12px;
  }
  .result-total-lbl {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 3px;
  }
  .result-total-val {
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
  }

  /* ── Footer ── */
  .footer {
    background: var(--white);
    text-align: center;
    padding: 14px 20px 22px;
    font-size: 10.5px;
    color: var(--text-muted);
    line-height: 1.6;
    border-top: 1px solid rgba(0,0,0,0.06);
    border-radius: 0 0 24px 24px;
  }

  /* ── Clear button ── */
  .panel-top {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }
  .clear-btn {
    background: none;
    border: 1.5px solid rgba(192,57,43,0.35);
    border-radius: 6px;
    color: var(--error);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .clear-btn:hover {
    background: rgba(192,57,43,0.08);
    border-color: var(--error);
    box-shadow: 0 2px 8px rgba(192,57,43,0.15);
  }
  .clear-btn:active {
    transform: scale(0.95);
    background: rgba(192,57,43,0.15);
  }

  @keyframes popIn {
    from { opacity:0; transform: scale(0.93) translateY(6px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
</style>
</head>
<body>
<div class="page-wrapper">

  <!-- Header -->
  <header class="header">
    <div class="company-tag">Premier Credit Ltd</div>
    <h1 class="main-title">Corporate Loan Calculator<br><span>(Schedule)</span></h1>
    <div class="title-rule"></div>
  </header>

  <div class="card">
    <!-- Tabs -->
    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" role="tab" id="tab-repayment" onclick="switchTab('repayment')">Repayment</button>
      <button class="tab-btn" role="tab" id="tab-qualifying" onclick="switchTab('qualifying')">Qualifying</button>
    </div>

    <!-- Repayment Panel -->
    <div class="tab-panel active" id="panel-repayment" role="tabpanel">
      <div class="panel-top">
        <button class="clear-btn" onclick="clearAll('r')">Clear</button>
      </div>
      <div class="field">
        <label for="r-amount">Loan Amount (KES)</label>
        <div class="input-wrap">
          <span class="input-prefix">KES</span>
          <input type="number" id="r-amount" placeholder="e.g. 50000" min="1" step="1" inputmode="numeric" oninput="clearResult('r')">
        </div>
      </div>
      <div class="field">
        <label for="r-term">Loan Term (Months)</label>
        <div class="input-wrap">
          <input type="number" id="r-term" placeholder="e.g. 6" min="1" max="360" step="1" class="no-prefix" inputmode="numeric" oninput="clearResult('r')">
        </div>
      </div>
      <button class="calc-btn" onclick="calcRepayment()">Calculate</button>
      <div class="error-msg" id="r-error"></div>
      <div class="result-box" id="r-result">
        <div class="result-label">Monthly Instalment</div>
        <div class="result-main" id="r-amount-out">—</div>
        <div class="result-divider"></div>
        <div class="result-total-lbl">Total Repayment</div>
        <div class="result-total-val" id="r-total">—</div>
      </div>
    </div>

    <!-- Qualifying Panel -->
    <div class="tab-panel" id="panel-qualifying" role="tabpanel">
      <div class="panel-top">
        <button class="clear-btn" onclick="clearAll('q')">Clear</button>
      </div>
      <div class="field">
        <label for="q-deduction">Monthly Deduction (Rounded KES)</label>
        <div class="input-wrap">
          <span class="input-prefix">KES</span>
          <input type="number" id="q-deduction" placeholder="e.g. 5000" min="1" step="1" inputmode="numeric" oninput="clearResult('q')">
        </div>
      </div>
      <div class="field">
        <label for="q-term">Desired Term (Months)</label>
        <div class="input-wrap">
          <input type="number" id="q-term" placeholder="e.g. 6" min="1" max="360" step="1" class="no-prefix" inputmode="numeric" oninput="clearResult('q')">
        </div>
      </div>
      <button class="calc-btn" onclick="calcQualifying()">Calculate</button>
      <div class="error-msg" id="q-error"></div>
      <div class="result-box" id="q-result">
        <div class="result-label">Qualifying Amount</div>
        <div class="result-main" id="q-amount-out">—</div>
        <div class="result-divider"></div>
        <div class="result-total-lbl">Total Repayment</div>
        <div class="result-total-val" id="q-total">—</div>
      </div>
    </div>

  </div><!-- /card -->

  <div class="footer">
    Calculations based on Premier Credit Ltd's approved schedule rates.<br>
    Results are indicative. Subject to credit approval &amp; terms.
  </div>

</div>
<script>
const EXACT_RATES = {
  1: 0.097060000000,
  2: 0.079041006027,
  3: 0.070109641550,
  4: 0.064778873386,
  5: 0.061231078253,
  6: 0.058705100751
};
const A = 0.07454452, B = -0.40703120, C = 0.02257153;

function getRate(n) {
  if (EXACT_RATES[n] !== undefined) return EXACT_RATES[n];
  return Math.max(A * Math.pow(n, B) + C, 0.005);
}
function calcInstalment(P, n) {
  const r = getRate(n);
  if (n === 1) return P * (1 + r);
  return P * r * Math.pow(1+r,n) / (Math.pow(1+r,n) - 1);
}
function calcPrincipal(inst, n) {
  const r = getRate(n);
  if (n === 1) return inst / (1 + r);
  return inst * (Math.pow(1+r,n) - 1) / (r * Math.pow(1+r,n));
}
function fmt(num) {
  return num.toLocaleString('en-KE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtTotal(num) {
  return 'KES ' + Math.round(num).toLocaleString('en-KE');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}
function clearResult(p) {
  document.getElementById(p+'-result').classList.remove('show');
  document.getElementById(p+'-error').classList.remove('show');
}
function clearAll(p) {
  if (p === 'r') {
    document.getElementById('r-amount').value = '';
    document.getElementById('r-term').value = '';
  } else {
    document.getElementById('q-deduction').value = '';
    document.getElementById('q-term').value = '';
  }
  clearResult(p);
}
function showError(p, msg) {
  const el = document.getElementById(p+'-error');
  el.textContent = msg; el.classList.add('show');
}

function calcRepayment() {
  clearResult('r');
  const P = parseFloat(document.getElementById('r-amount').value);
  const n = parseInt(document.getElementById('r-term').value);
  if (!P || P <= 0) return showError('r', 'Please enter a valid loan amount.');
  if (!n || n < 1 || n > 360) return showError('r', 'Please enter a term between 1 and 360 months.');
  const inst = calcInstalment(P, n);
  const total = inst * n;
  document.getElementById('r-amount-out').textContent = fmt(inst);
  document.getElementById('r-total').textContent = fmtTotal(total);
  document.getElementById('r-result').classList.add('show');
}

function calcQualifying() {
  clearResult('q');
  const inst = parseFloat(document.getElementById('q-deduction').value);
  const n = parseInt(document.getElementById('q-term').value);
  if (!inst || inst <= 0) return showError('q', 'Please enter a valid monthly deduction.');
  if (!n || n < 1 || n > 360) return showError('q', 'Please enter a term between 1 and 360 months.');
  const P = calcPrincipal(inst, n);
  const total = inst * n;
  document.getElementById('q-amount-out').textContent = fmt(P);
  document.getElementById('q-total').textContent = fmtTotal(total);
  document.getElementById('q-result').classList.add('show');
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.tab-panel.active').id;
  if (active === 'panel-repayment') calcRepayment();
  else calcQualifying();
});
</script>
</body>
</html>
